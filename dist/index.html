<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-text-id="txt_doc_title">Unsanity · Runner</title>
    <script type="module" crossorigin src="/assets/index-CiQvzBlk.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-C5hWho6S.css">
  </head>
  <body>
    <div class="app">
      <div class="viewport-wrap sketch-border sketch-shadow">
        <div id="game-viewport"></div>

        <!-- 인게임 HUD 전체 — `#jr-hud-widgets` (React + json-render) -->
        <div id="play-hud" class="play-hud" hidden>
          <div id="jr-hud-widgets" class="jr-hud-widgets"></div>
        </div>

        <div id="start-screen" class="overlay sketch-border-soft z-start">
          <div class="start-screen-body">
            <div id="jr-lobby-spec-header"></div>
            <div class="starter-coin-grid balance-tier-grid" role="radiogroup" aria-label="난이도">
              <input class="unsanity-radio-sr" type="radio" name="balance-tier" id="balance-tier-low"
                value="low" checked />
              <label class="starter-coin-opt balance-tier-opt" for="balance-tier-low">
                <span data-text-id="txt_tier_low_primary">하</span><br /><span
                  class="starter-coin-sec" data-text-id="txt_tier_low_sub">키 큼 장애 늦게</span>
              </label>
              <input class="unsanity-radio-sr" type="radio" name="balance-tier" id="balance-tier-mid"
                value="mid" />
              <label class="starter-coin-opt balance-tier-opt" for="balance-tier-mid">
                <span data-text-id="txt_tier_mid_primary">중</span><br /><span
                  class="starter-coin-sec" data-text-id="txt_tier_mid_sub">보통 페이즈</span>
              </label>
              <input class="unsanity-radio-sr" type="radio" name="balance-tier" id="balance-tier-high"
                value="high" />
              <label class="starter-coin-opt balance-tier-opt" for="balance-tier-high">
                <span data-text-id="txt_tier_high_primary">상</span><br /><span
                  class="starter-coin-sec" data-text-id="txt_tier_high_sub">빠른 압박</span>
              </label>
            </div>
            <div id="jr-lobby-spec-starter"></div>
            <div class="starter-coin-grid" role="radiogroup" aria-label="시작 코인 개수">
              <input class="unsanity-radio-sr" type="radio" name="starter-coins" id="starter-coins-1"
                value="1" />
              <label class="starter-coin-opt" for="starter-coins-1">
                <span data-text-id="txt_starter_coin_opt_1">1코인</span><br /><span
                  class="starter-coin-sec" data-text-id="txt_starter_coin_1_bonus">+100</span>
              </label>
              <input class="unsanity-radio-sr" type="radio" name="starter-coins" id="starter-coins-3"
                value="3" checked />
              <label class="starter-coin-opt" for="starter-coins-3">
                <span data-text-id="txt_starter_coin_opt_3">3코인</span><br /><span
                  class="starter-coin-sec" data-text-id="txt_starter_coin_3_bonus">+300</span>
              </label>
              <input class="unsanity-radio-sr" type="radio" name="starter-coins" id="starter-coins-5"
                value="5" />
              <label class="starter-coin-opt" for="starter-coins-5">
                <span data-text-id="txt_starter_coin_opt_5">5코인</span><br /><span
                  class="starter-coin-sec" data-text-id="txt_starter_coin_5_bonus">+500</span>
              </label>
              <input class="unsanity-radio-sr" type="radio" name="starter-coins" id="starter-coins-8"
                value="8" />
              <label class="starter-coin-opt" for="starter-coins-8">
                <span data-text-id="txt_starter_coin_opt_8">8코인</span><br /><span
                  class="starter-coin-sec" data-text-id="txt_starter_coin_8_bonus">+800</span>
              </label>
            </div>
          </div>
          <div id="jr-start-actions" class="jr-overlay-actions"></div>
        </div>

        <div id="gameover-screen" class="overlay overlay--solid z-gameover" hidden>
          <div class="gameover-screen-body">
            <div class="overlay-title caveat" data-text-id="txt_game_over_title">게임 오버</div>
            <p id="gameover-reason" class="overlay-sub reason mono" data-text-id="txt_gameover_reason_placeholder">
              —
            </p>
            <p class="mono">
              <span data-text-id="txt_label_score_word">점수</span> <span id="final-score">0</span
              ><span data-text-id="txt_separator_dot"> · </span
              ><span data-text-id="txt_label_coin_word">코인</span>
              <span id="final-coin">0</span>
            </p>
          </div>
          <div id="jr-restart-actions" class="jr-overlay-actions"></div>
        </div>
      </div>
    </div>

  </body>
</html>
